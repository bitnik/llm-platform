---
# Note: This namespace is required for the HelmRepository.
# If it is created in flux-system ns, then this namespace definition is not needed.
apiVersion: v1
kind: Namespace
metadata:
  name: kagent
---
# https://github.com/kagent-dev/kagent/tree/main/helm/kagent-crds
# https://github.com/kagent-dev/kagent/tree/main/helm/kagent
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kagent
  namespace: kagent
spec:
  type: oci
  interval: 1h
  url: oci://ghcr.io/kagent-dev/kagent/helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent-crds
  namespace: kagent
spec:
  interval: 15m
  # timeout: 15m
  chart:
    spec:
      # helm show chart oci://ghcr.io/kagent-dev/kagent/helm/kagent-crds
      chart: kagent-crds
      version: "0.9.10"
      sourceRef:
        kind: HelmRepository
        name: kagent
        namespace: kagent
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: kagent
spec:
  interval: 15m
  # timeout: 15m
  chart:
    spec:
      # helm show chart oci://ghcr.io/kagent-dev/kagent/helm/kagent
      chart: kagent
      version: "0.9.10"
      sourceRef:
        kind: HelmRepository
        name: kagent
        namespace: kagent
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
  - kind: Secret
    name: kagent-values
  values:
    controller:
      metrics:
        enabled: true
    providers:
      default: openAI
      openAI:
        provider: OpenAI
        model: "gpt-oss-20b"
        apiKeySecretRef: kagent-openai
        apiKeySecretKey: OPENAI_API_KEY
