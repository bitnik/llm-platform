---
# Copied from https://github.com/NVIDIA/gpu-usage-monitor/tree/main and replaced the hardcoded
# datasource UID "PBFA97CFB590B2093" with "prometheus" (kube-prometheus-stack's default).
# See also https://developer.nvidia.com/blog/get-real-time-visibility-into-gpu-usage-across-kubernetes-clusters/
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: gpu-operator
  labels:
    grafana_dashboard: "1"
data:
  # Both dashboards share the same layout.
  # The difference is in 5 panels (allocation %, running/pending GPU pods, inefficient pods):
  # the non-lite version joins DCGM with kube-state-metrics; the lite version uses DCGM metrics alone.
  gpu-usage-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "Prometheus",
              "uid": "prometheus"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": 0,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 14,
          "panels": [],
          "title": "GPU Allocation",
          "type": "row"
        },
        {
