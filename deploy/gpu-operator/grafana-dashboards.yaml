              "expr": "count(group(group(kube_pod_info) by(pod, namespace, node) * on(node) group_left(modelName) (group(DCGM_FI_DEV_FB_FREE{node!=\"\", modelName=~\"$gpu_type\"}) by(node, modelName) or group(label_replace(DCGM_FI_DEV_FB_FREE{modelName=~\"$gpu_type\"}, \"pod_ip\", \"$1\", \"instance\", \"(.*):(.*)\") * on (pod_ip) group_left(node) kube_pod_info{created_by_name=~\".*dcgm-exporter\", pod_ip!=\"\"}) by(node, modelName)) * on(pod, namespace) group_left() group(kube_pod_status_phase{phase=\"Running\"}==1) by(pod, namespace) * on(pod, namespace) group_left() sum(max(kube_pod_container_resource_requests{resource=\"nvidia_com_gpu\"}) by(container, pod, namespace)) by(pod, namespace)) by(pod, namespace) * on(pod, namespace) group_right() (label_replace(label_replace(DCGM_FI_DEV_GPU_UTIL{modelName=~\"$gpu_type\", exported_pod!=\"\", exported_namespace!=\"\"}==0, \"pod\", \"$1\", \"exported_pod\", \"(.*)\"), \"namespace\", \"$1\", \"exported_namespace\", \"(.*)\") or DCGM_FI_DEV_GPU_UTIL{modelName=~\"$gpu_type\"}==0)) or count(DCGM_FI_DEV_FB_FREE)*0",
              "hide": false,
              "instant": false,
              "legendFormat": "Idle Allocated GPUs",
              "range": true,
              "refId": "C"
            }
