---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nvidia
  namespace: flux-system
spec:
  interval: 24h
  url: https://helm.ngc.nvidia.com/nvidia
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-operator,
  namespace: gpu-operator
spec:
  interval: 30m
  chart:
    spec:
      chart: gpu-operator
      version: "v26.3.2"
      sourceRef:
        kind: HelmRepository
        name: nvidia
        namespace: flux-system
  # values:
  #   driver:
  #     enabled: false
  #   toolkit:
  #     enabled: false
  valuesFrom:
  - kind: ConfigMap
    name: gpu-operator-values
    valuesKey: values.yaml
