---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: deploy
  namespace: flux-system
spec:
  interval: 10m
  path: ./deploy
  prune: true
  # Generated while bootstrapping flux
  # kubectl get gitrepositories -n flux-system flux-system
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
